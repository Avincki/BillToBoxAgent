# BillToBoxAgent — example configuration.
# Copy to config.yaml and fill in. config.yaml is gitignored — never commit secrets.
# The worker and dashboard read the path from $BTB_CONFIG (default: config.yaml).

# --- required: external service credentials -----------------------------------

anthropic:
  api_key: REPLACE_ME              # Anthropic API key (sk-ant-...)
  # model: claude-opus-4-8         # override to claude-sonnet-4-6 / claude-haiku-4-5 for a cheaper tier
  # max_tokens: 1024               # extraction returns a small JSON object
  # max_attempts: 3                # retries on transient API errors (rate-limit / 5xx / connection)

google:                            # Gmail (read-only) + Drive (drive.file); one OAuth client, consent once
  client_id: REPLACE_ME
  client_secret: REPLACE_ME
  token_path: data/google_token.json   # refresh token written here (gitignored)

microsoft:                         # Outlook / Microsoft 365 (Mail.Read) via MSAL
  client_id: REPLACE_ME
  # client_secret: REPLACE_ME      # optional — the device-code (public client) flow needs none
  tenant_id: common                # 'common' works for personal + work/school accounts
  token_path: data/ms_token.json

billtobox:                         # email-ingest target (decisions.md)
  mailbox_address: upload-REPLACE_ME@mailbox.billtobox.com   # your Billtobox upload mailbox
  sender_address: invoices@your-domain.com                   # an address Billtobox accepts for it

smtp:                              # transport for emailing invoices to Billtobox (use an app password)
  host: smtp.gmail.com
  port: 587
  username: invoices@your-domain.com
  password: REPLACE_ME             # app password (NOT your normal login password)
  use_tls: true

# --- optional: behaviour (defaults shown; uncomment to override) --------------

